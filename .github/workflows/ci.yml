name: ci

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      JAVA_TOOL_OPTIONS: -Dorg.slf4j.simpleLogger.defaultLogLevel=info
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Set up Node (for Spectral via npx)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify
        run: ./mvnw -B clean verify -Pmutation,openapi-gate

      - name: Upload JaCoCo report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html
          path: target/site/jacoco
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload OpenAPI spec
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: openapi.yaml
          path: target/openapi.yaml
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload PIT mutation report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: pit-report
          path: target/pit-reports
          if-no-files-found: ignore
          retention-days: 14
