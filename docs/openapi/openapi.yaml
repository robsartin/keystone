openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /periods/{yyyymm}/reopen:
    post:
      tags:
      - period-controller
      operationId: reopen
      parameters:
      - name: yyyymm
        in: path
        required: true
        schema:
          type: string
          pattern: "^\\d{4}-(0[1-9]|1[0-2])$"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /periods/{yyyymm}/close:
    post:
      tags:
      - period-controller
      operationId: close
      parameters:
      - name: yyyymm
        in: path
        required: true
        schema:
          type: string
          pattern: "^\\d{4}-(0[1-9]|1[0-2])$"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /journal-entries:
    post:
      tags:
      - journal-entry-controller
      operationId: post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostJournalEntryRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /accounts:
    get:
      tags:
      - account-controller
      operationId: list
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountResponse"
    post:
      tags:
      - account-controller
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /accounts/{code}/reactivate:
    post:
      tags:
      - account-controller
      operationId: reactivate
      parameters:
      - name: code
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /accounts/{code}/deactivate:
    post:
      tags:
      - account-controller
      operationId: deactivate
      parameters:
      - name: code
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /accounts/{code}:
    get:
      tags:
      - account-controller
      operationId: get
      parameters:
      - name: code
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
    patch:
      tags:
      - account-controller
      operationId: update
      parameters:
      - name: code
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /periods:
    get:
      tags:
      - period-controller
      operationId: list_1
      parameters:
      - name: status
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PeriodResponse"
  /periods/{yyyymm}:
    get:
      tags:
      - period-controller
      operationId: get_1
      parameters:
      - name: yyyymm
        in: path
        required: true
        schema:
          type: string
          pattern: "^\\d{4}-(0[1-9]|1[0-2])$"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
components:
  schemas:
    PostJournalEntryRequest:
      type: object
      properties:
        occurredOn:
          type: string
          format: date
        description:
          type: string
          maxLength: 500
          minLength: 0
        postings:
          type: array
          items:
            $ref: "#/components/schemas/PostingRequest"
          minItems: 1
      required:
      - description
      - occurredOn
      - postings
    PostingRequest:
      type: object
      properties:
        account:
          type: string
          minLength: 1
        side:
          type: string
          pattern: ^(DEBIT|CREDIT)$
        minorUnits:
          type: integer
          format: int64
        currency:
          type: string
          minLength: 1
          pattern: "^[A-Z]{3}$"
        baseMinorUnits:
          type: integer
          format: int64
      required:
      - account
      - currency
      - side
    CreateAccountRequest:
      type: object
      properties:
        code:
          type: string
          maxLength: 64
          minLength: 0
        name:
          type: string
          maxLength: 200
          minLength: 0
        type:
          type: string
          minLength: 1
          pattern: ^(ASSET|LIABILITY|EQUITY|REVENUE|EXPENSE)$
        currency:
          type: string
          minLength: 1
          pattern: "^[A-Z]{3}$"
        parentCode:
          type: string
          maxLength: 64
          minLength: 0
      required:
      - code
      - currency
      - name
      - type
    UpdateAccountRequest:
      type: object
      properties:
        newCode:
          type: string
          maxLength: 64
          minLength: 0
        newParentCode:
          type: string
          maxLength: 64
          minLength: 0
    PeriodResponse:
      type: object
      properties:
        yearMonth:
          type: string
        status:
          type: string
        closedAt:
          type: string
          format: date-time
        closedBy:
          type: string
        reopenedAt:
          type: string
          format: date-time
        reopenedBy:
          type: string
    AccountResponse:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        type:
          type: string
        currency:
          type: string
        parentCode:
          type: string
        active:
          type: boolean
