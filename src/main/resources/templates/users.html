<!DOCTYPE html>
<html
    xmlns:th="http://www.thymeleaf.org"
    th:replace="~{layout :: layout(pageTitle='Users', content=~{::section})}">
  <head>
    <title>Users</title>
  </head>
  <body>
    <section>
      <h1>Users in this tenant</h1>
      <form
          th:action="@{/admin/ui/users}"
          th:hx-post="@{/admin/ui/users}"
          hx-target="tbody:last-of-type"
          hx-swap="afterbegin"
          method="post"
          class="row g-3 mb-4">
        <div class="col-auto">
          <label for="userSub" class="form-label">User sub</label>
          <input type="text" class="form-control" id="userSub" name="userSub" required />
        </div>
        <div class="col-auto">
          <label for="addRole" class="form-label">Role</label>
          <select class="form-select" id="addRole" name="role" required>
            <option value="ADMIN">ADMIN</option>
            <option value="BOOKKEEPER">BOOKKEEPER</option>
            <option value="READ_ONLY">READ_ONLY</option>
          </select>
        </div>
        <div class="col-auto d-flex align-items-end">
          <button type="submit" class="btn btn-primary">Add user</button>
        </div>
      </form>
      <table class="table">
        <thead>
          <tr>
            <th scope="col">User</th>
            <th scope="col">Role</th>
            <th scope="col">Granted</th>
            <th scope="col"></th>
          </tr>
        </thead>
        <tbody th:if="${users.isEmpty()}">
          <tr>
            <td colspan="4" class="text-muted">No users yet.</td>
          </tr>
        </tbody>
        <tbody>
          <th:block th:each="u : ${users}">
            <tr th:replace="~{fragments/user-row :: row(user=${u}, roles=${roles})}"></tr>
          </th:block>
        </tbody>
      </table>
    </section>
  </body>
</html>
