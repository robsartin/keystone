name: keystone

services:
  postgres:
    image: postgres:16
    container_name: keystone-postgres
    environment:
      POSTGRES_USER: keystone
      POSTGRES_PASSWORD: keystone
      POSTGRES_DB: keystone
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Init scripts under /docker-entrypoint-initdb.d/ run during container
      # initialization, as the built-in Postgres superuser, before the app
      # ever connects. 01-nosuperuser.sql drops SUPERUSER+BYPASSRLS from the
      # `keystone` role so Row-Level Security actually applies to the app.
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "keystone", "-d", "keystone"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
    image: keystone:local
    container_name: keystone-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:postgresql://postgres:5432/keystone
      # App-runtime pool: NOSUPERUSER role so RLS applies.
      DATABASE_USER: keystone_app
      DATABASE_PASSWORD: keystone_app
      # Flyway migrations run as the SUPERUSER schema owner.
      FLYWAY_USER: keystone
      FLYWAY_PASSWORD: keystone
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s

  prometheus:
    image: prom/prometheus:latest
    container_name: keystone-prometheus
    volumes:
      - ./compose/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      app:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: keystone-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./compose/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./compose/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
